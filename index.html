<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="author" content="YieldOS" />
    <link rel="canonical" href="https://yieldos.app/" />

    <!-- Open Graph (Facebook, LinkedIn, Slack, Discord) -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="YieldOS" />
    <meta property="og:url"         content="https://yieldos.app/" />
    <meta property="og:title"       content="YieldOS — Track your paychecks. Plan your freedom." />
    <meta property="og:description" content="The only dividend tracker that shows every payout as a paycheck and projects your exact year to financial independence." />
    <meta property="og:image"       content="https://yieldos.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="YieldOS — Track your paychecks. Plan your freedom." />
    <meta name="twitter:description" content="Income-first dividend tracker. Paycheck calendar, Path to FIRE projection, Daily AI Briefing." />
    <meta name="twitter:image"       content="https://yieldos.app/og-image.png" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- JSON-LD schema so Google understands what this is -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "YieldOS",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "description": "Income-first dividend tracker with Path to FIRE projection, paycheck calendar, and daily AI briefing.",
        "offers": [
          { "@type": "Offer", "name": "Seed",    "price": "0",  "priceCurrency": "USD" },
          { "@type": "Offer", "name": "Grow",    "price": "9",  "priceCurrency": "USD" },
          { "@type": "Offer", "name": "Harvest", "price": "19", "priceCurrency": "USD" }
        ]
      }
    </script>
    <style>
      /* ── Theme tokens ──────────────────────────────────────────────
         Dark is the default. Light mode is opt-in via data-theme="light"
         on the <html> element, toggled by the Settings modal. Accent
         colors (blue/emerald/gold/red) don't change between themes —
         only the surface + text layers flip. Keeping the accent palette
         fixed means charts, chips, and focus rings stay recognizable
         across themes without a full redesign. */
      :root {
        --bg:         #080b10;
        --surface:    #0f1420;
        --card:       #131925;
        --border:     #1c2536;
        --text:       #f1f5f9;
        --text-sub:   #94a3b8;
        --text-muted: #4a5568;
        --blue-glow:  rgba(79,142,247,0.12);
      }
      html[data-theme="light"] {
        /* Light palette mirrors the dark hierarchy — three layers stacking
           from recessed to elevated (bg → surface → card) — so cards have
           real lift against the page instead of looking like white-on-white.
           Border is pulled darker than the eyedropper instinct suggests so
           card edges stay crisp on a gray page. text-muted is darker than
           the dark-mode equivalent because #94a3b8 on pure white is too
           ghostly to read. */
        --bg:         #e8ecf2;
        --surface:    #f4f6fa;
        --card:       #ffffff;
        --border:     #cfd7e2;
        --text:       #0f172a;
        --text-sub:   #475569;
        --text-muted: #64748b;
        --blue-glow:  rgba(79,142,247,0.10);
      }
      /* Light-mode card lift — a whisper of shadow on any major rounded
         container so cards look like they're floating above the gray page.
         Scoped to radii 12+ to skip chips/pills/small buttons which should
         stay flat. We match both "border-radius:16" and "border-radius: 16"
         because inline styles vary across the codebase. */
      html[data-theme="light"] [style*="border-radius:12"],
      html[data-theme="light"] [style*="border-radius:14"],
      html[data-theme="light"] [style*="border-radius:16"],
      html[data-theme="light"] [style*="border-radius: 12"],
      html[data-theme="light"] [style*="border-radius: 14"],
      html[data-theme="light"] [style*="border-radius: 16"] {
        box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 4px 12px -4px rgba(15,23,42,0.08);
      }
      html, body { background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; transition: background 0.2s ease; }
      #root { background: var(--bg); min-height: 100vh; }
      * { -webkit-tap-highlight-color: transparent; }

      /* ── Tablet (≤900px) ─────────────────────────────────────────── */
      @media (max-width: 900px) {
        /* Any grid that says "repeat(4,…)" → 2 cols */
        [style*="repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
        /* Any grid that says "repeat(3,…)" → 1 col (single file on small screens) */
        [style*="repeat(3"] { grid-template-columns: 1fr !important; }
        /* Common 2-col layouts */
        [style*="1fr 320px"],
        [style*="1fr 1fr"] { grid-template-columns: 1fr !important; }
        /* Nav padding */
        nav { padding-left: 16px !important; padding-right: 16px !important; }
        /* Main content container */
        [style*="1160"] { padding-left: 14px !important; padding-right: 14px !important; }
        /* Wrap all tables so they scroll horizontally instead of overflowing the page */
        table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
        table thead, table tbody, table tr { display: table; width: 100%; table-layout: auto; }
      }

      /* ── Phone (≤600px) ─────────────────────────────────────────── */
      @media (max-width: 600px) {
        /* Legacy rule for the in-app top tab bar — keep it scrollable.
           The landing-nav on the marketing page has its own responsive
           behavior handled in AppMain.jsx (hides anchor links, shrinks CTA). */
        nav:not(.landing-nav) { overflow-x: auto !important; -webkit-overflow-scrolling: touch; flex-wrap: nowrap !important; }
        nav:not(.landing-nav) > button, nav:not(.landing-nav) > * { flex-shrink: 0 !important; }
        /* Headline sizes back off */
        h1 { font-size: 34px !important; line-height: 1.12 !important; }
        h2 { font-size: 22px !important; }
        /* Modal / card inner padding can shrink */
        [style*="padding:32"] { padding: 20px !important; }
        [style*="padding: 32"] { padding: 20px !important; }
        [style*="padding:22"] { padding: 16px !important; }
        table { font-size: 11px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
