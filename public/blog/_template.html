<!--
  This is the shared template for all blog posts. Each post is a single
  self-contained HTML file that Google can crawl and index immediately —
  no React, no hydration, no JS-required rendering. Design stays consistent
  with the main app via CSS variables that mirror index.html.

  When writing a new post:
    1. Copy this file, rename to your slug (kebab-case).
    2. Update <title>, <meta description>, <meta og:*>, <link canonical>.
    3. Update the JSON-LD BlogPosting schema at the bottom of <head>.
    4. Write the article in <main>. Use <h1> once, <h2>/<h3> for sections.
    5. Add an entry to public/sitemap.xml with the new URL + date.
-->
<!DOCTYPE html>
<html lang="en"></html>
